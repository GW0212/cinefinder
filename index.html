<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>cinefinder</title>
  <meta name="description" content="전 세계 영화와 드라마를 한 곳에서 탐색하고, 관심 작품을 즐겨찾기와 워치리스트로 관리하세요." />
  <meta name="theme-color" content="#ffffff" />
  <meta property="og:title" content="cinefinder" />
  <meta property="og:description" content="전 세계 영화와 드라마를 한 곳에서 탐색" />
  <link rel="icon" type="image/png" sizes="128x128" href="favicon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="apple-touch-icon" href="icons/icon128.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="cinefinder" />
  <meta name="og:image" content="icons/icon128.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=1780816800" />
</head>
<body>
<div id="app">

  <!-- ══════════ FILTER DRAWER ══════════ -->
  <aside id="drawer" class="drawer" aria-hidden="true" inert>
    <div class="drawer-header">
      <div class="drawer-title-row">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        <span id="i18nFilters">필터</span>
      </div>
      <button id="closeDrawer" class="drawer-close-btn" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="drawer-body">

      <!-- 국가 -->
      <div class="filter-section">
        <div class="filter-section-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          <span id="i18nCountry">국가</span>
        </div>
        <div class="custom-select-wrap">
          <select id="countrySelect" class="custom-select"></select>
          <svg class="select-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>

      <!-- 연도 범위 -->
      <div class="filter-section">
        <div class="filter-section-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span id="i18nYearRange">연도 범위</span>
        </div>
        <div class="year-inputs">
          <div class="year-field">
            <label class="year-field-label" id="labelFrom">From</label>
            <input id="yearFrom" type="number" placeholder="1900" min="1900" max="2100" class="year-input" />
          </div>
          <div class="year-dash">—</div>
          <div class="year-field">
            <label class="year-field-label" id="labelTo">To</label>
            <input id="yearTo" type="number" placeholder="2026" min="1900" max="2100" class="year-input" />
          </div>
        </div>
        <p class="filter-hint" id="i18nYearHint">비워두면 전체 연도</p>
      </div>


      <!-- 최소 평점 -->
      <div class="filter-section">
        <div class="filter-section-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <span id="i18nMinRating">최소 평점</span>
        </div>
        <div class="custom-select-wrap">
          <select id="ratingSelect" class="custom-select">
            <option value="0">전체</option>
            <option value="5">5.0 이상</option>
            <option value="6">6.0 이상</option>
            <option value="7">7.0 이상</option>
            <option value="7.5">7.5 이상</option>
            <option value="8">8.0 이상</option>
            <option value="9">9.0 이상</option>
          </select>
          <svg class="select-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>



      <!-- 포함 장르 -->
      <div class="filter-section">
        <div class="filter-section-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          <span id="i18nGenreInclude">포함 장르</span>
        </div>
        <div id="genreIncludeList" class="genre-chip-grid"></div>
      </div>

      <!-- 제외 장르 -->
      <div class="filter-section">
        <div class="filter-section-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
          <span id="i18nGenreExclude">제외 장르</span>
        </div>
        <div id="genreExcludeList" class="genre-chip-grid"></div>
        <p class="filter-hint" id="i18nGenreHint">영화 장르 기준으로 고정됩니다</p>
      </div>

    </div><!-- /drawer-body -->

    <div class="drawer-footer">
      <button id="resetBtn" class="df-btn df-btn-reset">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.05"/></svg>
        <span>초기화</span>
      </button>
      <button id="applyBtn" class="df-btn df-btn-apply">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
        <span>필터 적용</span>
      </button>
    </div>
  </aside>
  <div id="drawerOverlay" class="drawer-overlay"></div>

  <!-- ══════════ HEADER ══════════ -->
  <header class="site-header">

    <!-- Row 1 : 로고 (중앙) + 유틸리티 (오른쪽) -->
    <div class="header-top">
      <div class="header-top-left">
        <button id="menuBtn" class="hdr-icon-btn filter-toggle" aria-label="필터" title="필터">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          <span class="filter-badge hidden" id="filterBadge"></span>
        </button>
      </div>

      <div class="header-top-center">
        <div id="homeBtn" class="logo" role="button" tabindex="0" aria-label="홈">
          <img src="icons/icon48.png" alt="cinefinder" class="logo-img" />
          <span class="logo-text">cinefinder</span>
        </div>
      </div>

      <div class="header-top-right">
        <select id="langSelect" class="hdr-select lang-select" aria-label="Language">
          <option value="ko">🇰🇷 KO</option>
          <option value="en">🇺🇸 EN</option>
          <option value="ja">🇯🇵 JA</option>
          <option value="zh">🇨🇳 ZH</option>
          <option value="fr">🇫🇷 FR</option>
        </select>
        <!-- 다크/라이트 토글 -->
        <button id="themeToggle" class="hdr-icon-btn theme-toggle" aria-label="테마 전환" title="다크/라이트 모드">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>

    <!-- Row 2: 탭/정렬/저장 + 검색 (모바일 2줄) -->
    <div class="controlbar">
      <!-- 줄1: 탭 + 정렬 + 저장 -->
      <div class="ctrl-row1">
        <div class="type-tabs" role="tablist">
          <button data-type="all"   class="tab active" role="tab" id="tabAll">모두</button>
          <button data-type="movie" class="tab"        role="tab" id="tabMovie">영화</button>
          <button data-type="tv"    class="tab"        role="tab" id="tabTV">드라마</button>
          <button data-type="anime" class="tab"        role="tab" id="tabAnime">애니</button>
        </div>
        <div class="ctrl-row1-right">
          <div class="custom-select-wrap sort-wrap">
            <select id="sortSelect" class="hdr-select sort-select">
              <option value="popularity.desc">인기순</option>
              <option value="vote_average.desc">평점순</option>
              <option value="date.desc">최신순</option>
            </select>
            <svg class="select-arrow" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>
      </div>
      <!-- 줄2: 저장 목록 + 검색 -->
      <div class="ctrl-row2">
        <form id="searchForm" class="search-form" autocomplete="off">
          <div class="searchbox-wrap">
            <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input id="searchInput" type="text" placeholder="영화·드라마·감독·배우 검색" autocomplete="off" />
            <button type="button" id="clearSearch" class="clear-btn" aria-label="지우기">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <div id="suggestBox" class="suggest hidden" role="listbox"></div>
          </div>
          <button id="searchBtn" type="submit" class="btn-search">검색</button>
        </form>
        <div class="library-actions" aria-label="저장 목록">
          <button id="btnFav" class="saved-btn fav-saved" title="즐겨찾기">
            <span class="saved-btn-icon" aria-hidden="true">♡</span>
            <span>즐겨찾기</span>
          </button>
          <button id="btnWatch" class="saved-btn watch-saved" title="나중에 보기">
            <span class="saved-btn-icon" aria-hidden="true">⏱</span>
            <span>나중에 보기</span>
          </button>
          <button id="btnRatings" class="saved-btn ratings-saved" title="내 평점">
            <span class="saved-btn-icon" aria-hidden="true">☆</span>
            <span>내 평점</span>
          </button>
        </div>
      </div>
    </div>

  </header>

  <!-- ══════════ CONTENT ══════════ -->
  <div id="offlineBar" class="offline-bar hidden" aria-live="polite"></div>
  <div id="status" class="status-msg"></div>
  <div id="activeFilterBar" class="active-filter-bar hidden" aria-label="적용된 필터"></div>
  <div id="savedToolbar" class="saved-toolbar hidden" aria-live="polite" data-mode="">
    <div class="saved-toolbar-inner">
      <span id="savedToolbarLabel" class="saved-toolbar-label"></span>
      <div class="saved-toolbar-actions">
        <button id="btnExport" class="io-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>내보내기</span>
        </button>
        <button id="btnImport" class="io-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 5 17 10"/><line x1="12" y1="5" x2="12" y2="17"/></svg>
          <span>가져오기</span>
        </button>
        <div class="io-divider"></div>
        <button id="btnClearList" class="io-btn io-btn-danger">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          <span>초기화</span>
        </button>
        <input type="file" id="importFileInput" accept=".json" style="display:none" />
      </div>
    </div>
  </div>
  <main id="results" class="results-grid"></main>
  <div id="sentinel" aria-hidden="true"></div>

  <!-- ══════════ MODAL ══════════ -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">
      <button id="modalClose" class="modal-close" aria-label="닫기">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- ══════════ UTILITIES ══════════ -->
  <div id="toast" class="toast" aria-live="polite"></div>
  <button id="scrollTopBtn" class="scroll-top-btn" aria-label="맨위로">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="18,15 12,9 6,15"/></svg>
  </button>

</div><!-- /#app -->
<script src="app.js?v=1780816800"></script>
</body>
</html>
